name: sync-upstream

on:
  schedule:
    - cron: '0 0 * * *'  # daily 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout self
        uses: actions/checkout@v4

      - name: Sync SukkaLab/ruleset.skk.moe (master)
        run: |
          set -e
          rm -rf /tmp/sukkalab sukkalab
          git clone --depth=1 https://github.com/SukkaLab/ruleset.skk.moe.git /tmp/sukkalab
          rm -rf /tmp/sukkalab/.git
          mv /tmp/sukkalab sukkalab

      - name: Sync MetaCubeX/meta-rules-dat (release)
        run: |
          set -e
          rm -rf /tmp/metacubex metacubex
          git clone --depth=1 --branch=release https://github.com/MetaCubeX/meta-rules-dat.git /tmp/metacubex
          rm -rf /tmp/metacubex/.git
          mv /tmp/metacubex metacubex

      - name: Sync Hackl0us/GeoIP2-CN (release)
        run: |
          set -e
          rm -rf /tmp/hackl0us hackl0us
          git clone --depth=1 --branch=release https://github.com/Hackl0us/GeoIP2-CN.git /tmp/hackl0us
          rm -rf /tmp/hackl0us/.git
          mv /tmp/hackl0us hackl0us

      - name: Commit + push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No upstream changes — nothing to commit"
            exit 0
          fi
          git commit -m "chore: sync upstream $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
